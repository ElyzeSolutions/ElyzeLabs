services:
  gateway:
    image: ${ELYZELABS_GATEWAY_IMAGE:-ghcr.io/elyzesolutions/elyzelabs:latest}
    pull_policy: always
    environment:
      OPS_API_TOKEN: ${OPS_API_TOKEN:-local-dev-token-change-me}
      OPS_SERVER_HOST: 0.0.0.0
      OPS_SERVER_PORT: 8788
      OPS_SQLITE_PATH: /var/lib/ops/state/control-plane.db
      OPS_RUNTIME_WORKSPACE_ROOT: /var/lib/ops/workspaces
      OPS_RUNTIME_WORKSPACE_STRATEGY: ${OPS_RUNTIME_WORKSPACE_STRATEGY:-session}
      OPS_RUNTIME_TOOL_BIN_DIR: /var/lib/ops/tooling/bin
      OPS_RUNTIME_UV_TOOL_DIR: /var/lib/ops/tooling/uv-tools
      OPS_RUNTIME_UV_PYTHON_INSTALL_DIR: /var/lib/ops/tooling/python
      OPS_SKILLS_DIRECTORIES: /var/lib/ops/skills,/home/node/.agents/skills
      OPS_SKILLS_INSTALLER_INSTALL_ROOT: /home/node/.agents/skills
      OPS_SKILLS_CATALOG_STRICT: ${OPS_SKILLS_CATALOG_STRICT:-false}
      OPS_MEMORY_WORKSPACE_FILE: MEMORY.md
      OPS_MEMORY_DAILY_DIR: .ops/memory-daily
      POLYBOT_CONFIG: /var/lib/ops/state/polybot/config.yaml

      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      OPS_TELEGRAM_ENABLED: ${OPS_TELEGRAM_ENABLED:-true}
      OPS_TELEGRAM_BOT_TOKEN: ${OPS_TELEGRAM_BOT_TOKEN:-}
      OPS_TELEGRAM_CHAT_ID: ${OPS_TELEGRAM_CHAT_ID:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      AUTH_TOKEN: ${AUTH_TOKEN:-}
      CT0: ${CT0:-}
      X_BEARER_TOKEN: ${X_BEARER_TOKEN:-}
      MT5_HOST: ${MT5_HOST:-}
      MT5_PORT: ${MT5_PORT:-}
      POLYBOT_VAULT_KEY: ${POLYBOT_VAULT_KEY:-}

      OPS_VAULT_ENABLED: ${OPS_VAULT_ENABLED:-true}
      OPS_VAULT_AUTO_UNLOCK_FROM_ENV: ${OPS_VAULT_AUTO_UNLOCK_FROM_ENV:-false}
      OPS_VAULT_ENV_KEY: ${OPS_VAULT_ENV_KEY:-}
    volumes:
      - elyzelabs_ops:/var/lib/ops
      - elyzelabs_agents_skills:/home/node/.agents/skills
    ports:
      - "${OPS_GATEWAY_PORT_SPEC:-8788:8788}"
      - "${OPS_EXTRA_PORT_SPEC:-8080:8080}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8788/health"]
      interval: 15s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  elyzelabs_ops:
  elyzelabs_agents_skills:
