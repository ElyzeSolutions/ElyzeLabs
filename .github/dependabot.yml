version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "05:00"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 2
    groups:
      github-actions-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/dashboard"
      - "/packages/config"
      - "/packages/db"
      - "/packages/gateway"
      - "/packages/memory"
      - "/packages/observability"
      - "/packages/queue"
      - "/packages/runtime"
      - "/packages/shared"
      - "/packages/skills"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "05:15"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 8
    cooldown:
      default-days: 3
      semver-major-days: 21
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      monorepo-minor-and-patch:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
        group-by: "dependency-name"
