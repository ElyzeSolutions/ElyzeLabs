name: Control Plane CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.30.3

      - name: Install
        run: pnpm install

      - name: Config Doctor
        run: pnpm doctor:config

      - name: Guardrails
        run: pnpm guardrails:check

      - name: Publish Readiness
        run: pnpm publish:check

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit Tests
        run: pnpm test:unit

      - name: Integration Tests
        run: pnpm test:integration

      - name: UI Tests
        run: pnpm test:ui

      - name: Perf Tests
        run: pnpm test:perf

      - name: Browser Tests
        run: pnpm test:browser

      - name: E2E Tests
        run: pnpm test:e2e

      - name: Chaos Tests
        run: pnpm test:chaos
